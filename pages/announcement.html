<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TrustGov — Announcements</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"/>
    <link rel="stylesheet" href="/trustgov/assets/css/theme.css"/>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
            <i class="fas fa-landmark text-white text-sm"></i>
        </div>
        <div>
            <div class="sidebar-logo-text">TrustGov</div>
            <div class="sidebar-logo-sub">Budget Transparency Portal</div>
        </div>
    </div>
    <nav class="sidebar-nav">
        <div class="sidebar-section-label">Main Menu</div>
        <a href="dashboard.html" class="sidebar-link">
            <span class="link-icon"><i class="fas fa-chart-pie"></i></span>Dashboard
        </a>
        <a href="budgets.html" class="sidebar-link">
            <span class="link-icon"><i class="fas fa-wallet"></i></span>Budgets
        </a>
        <a href="projects.html" class="sidebar-link">
            <span class="link-icon"><i class="fas fa-project-diagram"></i></span>Projects
        </a>
        <a href="expenses.html" class="sidebar-link">
            <span class="link-icon"><i class="fas fa-receipt"></i></span>Expenses
        </a>
        <a href="feedback.html" class="sidebar-link">
            <span class="link-icon"><i class="fas fa-comments"></i></span>Feedback
        </a>
        <div class="sidebar-section-label" id="adminSection" style="display:none">Admin</div>
        <a href="users.html" class="sidebar-link" id="usersNavLink" style="display:none">
            <span class="link-icon"><i class="fas fa-users"></i></span>Users
        </a>
        <a href="audit.html" class="sidebar-link" id="auditNavLink" style="display:none">
            <span class="link-icon"><i class="fas fa-clipboard-list"></i></span>Audit Log
        </a>
        <div class="sidebar-section-label">Account</div>
        <a href="profile.html" class="sidebar-link">
            <span class="link-icon"><i class="fas fa-user-circle"></i></span>My Profile
        </a>
        <a href="announcements.html" class="sidebar-link active">
            <span class="link-icon"><i class="fas fa-bullhorn"></i></span>Announcements
        </a>
        <a href="reports.html" class="sidebar-link">
            <span class="link-icon"><i class="fas fa-file-alt"></i></span>Reports
        </a>
    </nav>
    <div class="sidebar-footer">
        <div class="sidebar-avatar" id="sidebarAvatar">J</div>
        <div style="flex:1;min-width:0">
            <div class="sidebar-user-name" id="sidebarUserName">Loading...</div>
            <div class="sidebar-user-role" id="sidebarUserRole">—</div>
        </div>
    </div>
</aside>

<!-- Main Wrapper -->
<div class="main-wrapper">
    <header class="top-header">
        <div>
            <h1 class="header-title">Announcements</h1>
            <p style="font-size:0.75rem;color:var(--text-secondary);margin-top:0.1rem">
                Official announcements from your barangay.
            </p>
        </div>
        <div class="header-actions">
            <select id="categoryFilter" onchange="loadAnnouncements()" class="form-input text-sm" style="width:150px">
                <option value="">All Categories</option>
                <option value="info">Info</option>
                <option value="warning">Warning</option>
                <option value="urgent">Urgent</option>
            </select>
            <button onclick="window.print()" class="btn-secondary" style="padding:0.4rem 1rem;font-size:0.8rem">
                <i class="fas fa-print"></i> Print
            </button>
            <button id="addAnnouncementBtn" onclick="openModal()" class="btn-primary hidden"
                style="padding:0.4rem 1rem;font-size:0.8rem">
                <i class="fas fa-plus"></i> Post Announcement
            </button>
            <button id="themeToggleBtn" onclick="toggleTheme()" class="theme-toggle">
                <i class="fas fa-moon" style="color:var(--text-secondary)"></i>
            </button>
            <button onclick="logout()" class="btn-danger" style="padding:0.4rem 1rem;font-size:0.8rem">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </header>

    <div class="page-content">
        <!-- Summary Cards -->
        <div id="announcementSummaryCards" class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6"></div>
        <!-- Feed -->
        <div id="announcementFeed" class="space-y-4"></div>
    </div>
</div>

<!-- Modal -->
<div id="announcementModal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay">
    <div class="modal-box w-full max-w-lg p-8 animate__animated animate__zoomIn">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-lg font-bold" style="color:var(--text-primary)">Post Announcement</h3>
            <button onclick="closeModal()" class="btn-icon btn-icon-delete"><i class="fas fa-times"></i></button>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1" style="color:var(--text-secondary)">Title</label>
                <input id="announcementTitle" type="text" class="form-input" placeholder="Announcement title"/>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1" style="color:var(--text-secondary)">Category</label>
                <select id="announcementCategory" class="form-input">
                    <option value="info">ℹ️ Info</option>
                    <option value="warning">⚠️ Warning</option>
                    <option value="urgent">🚨 Urgent</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1" style="color:var(--text-secondary)">Message</label>
                <textarea id="announcementBody" class="form-input" rows="5"
                    placeholder="Write your announcement here..."></textarea>
            </div>
            <div class="flex gap-3 pt-2">
                <button onclick="postAnnouncement()" class="btn-primary flex-1">
                    <i class="fas fa-bullhorn"></i> Post
                </button>
                <button onclick="closeModal()" class="btn-secondary flex-1">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/trustgov/assets/js/theme.js"></script>
<script src="/trustgov/assets/js/api.js"></script>
<script>
    let currentUser;
    let allAnnouncements = [];

    document.addEventListener('DOMContentLoaded', async () => {
        currentUser = requireAuth();
        renderSidebar(currentUser);
        if (currentUser.role === 'official') {
            document.getElementById('addAnnouncementBtn').classList.remove('hidden');
        }
        await loadAnnouncements();
    });

    /** Renders summary cards */
    function renderSummaryCards(data) {
        const total   = data.length;
        const urgent  = data.filter(a => a.category === 'urgent').length;
        const warning = data.filter(a => a.category === 'warning').length;

        document.getElementById('announcementSummaryCards').innerHTML = `
            <div class="stat-card">
                <div class="stat-icon" style="background:linear-gradient(135deg,#2563eb,#1d4ed8)">
                    <i class="fas fa-bullhorn"></i>
                </div>
                <div>
                    <div class="stat-label">Total</div>
                    <div class="stat-value">${total}</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:linear-gradient(135deg,#dc2626,#b91c1c)">
                    <i class="fas fa-exclamation-circle"></i>
                </div>
                <div>
                    <div class="stat-label">Urgent</div>
                    <div class="stat-value">${urgent}</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:linear-gradient(135deg,#d97706,#b45309)">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <div>
                    <div class="stat-label">Warnings</div>
                    <div class="stat-value">${warning}</div>
                </div>
            </div>`;
    }

    /** Loads and renders announcements */
    async function loadAnnouncements() {
        const res = await apiGet('/announcements/read.php');
        const categoryFilter = document.getElementById('categoryFilter').value;
        const feed = document.getElementById('announcementFeed');

        if (res.status !== 'success' || res.data.length === 0) {
            renderSummaryCards([]);
            feed.innerHTML = `
                <div class="card p-12 text-center">
                    <i class="fas fa-bullhorn text-5xl mb-4" style="color:var(--border-color)"></i>
                    <p style="color:var(--text-secondary)">No announcements yet.</p>
                </div>`;
            return;
        }

        allAnnouncements = res.data;
        const filtered = categoryFilter ? allAnnouncements.filter(a => a.category === categoryFilter) : allAnnouncements;
        renderSummaryCards(filtered);

        const categoryStyles = {
            info:    { bg: '#eff6ff', color: '#2563eb', icon: 'fa-info-circle',         label: 'Info',    border: '#2563eb' },
            warning: { bg: '#fffbeb', color: '#d97706', icon: 'fa-exclamation-triangle', label: 'Warning', border: '#d97706' },
            urgent:  { bg: '#fef2f2', color: '#dc2626', icon: 'fa-exclamation-circle',   label: 'Urgent',  border: '#dc2626' }
        };

        feed.innerHTML = filtered.map(a => {
            const style = categoryStyles[a.category] || categoryStyles.info;
            return `
            <div class="card animate__animated animate__fadeInUp"
                style="border-left:4px solid ${style.border};padding:1.5rem">
                <div class="flex items-start justify-between gap-4">
                    <div class="flex items-start gap-3 flex-1">
                        <div style="width:2.5rem;height:2.5rem;border-radius:0.625rem;
                            background:${style.bg};display:flex;align-items:center;
                            justify-content:center;flex-shrink:0">
                            <i class="fas ${style.icon}" style="color:${style.color}"></i>
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1 flex-wrap">
                                <h3 class="font-bold text-base" style="color:var(--text-primary)">${a.title}</h3>
                                <span style="background:${style.bg};color:${style.color};
                                    padding:0.15rem 0.5rem;border-radius:9999px;font-size:0.7rem;font-weight:700">
                                    ${style.label}
                                </span>
                            </div>
                            <p style="color:var(--text-secondary);font-size:0.875rem;line-height:1.6;margin-bottom:0.75rem">
                                ${a.body}
                            </p>
                            <div style="font-size:0.75rem;color:var(--text-secondary)">
                                <i class="fas fa-user-tie mr-1"></i>${a.posted_by_name} &nbsp;·&nbsp;
                                <i class="fas fa-map-marker-alt mr-1"></i>${a.barangay_name} &nbsp;·&nbsp;
                                <i class="fas fa-clock mr-1"></i>${a.created_at.slice(0,16)}
                            </div>
                        </div>
                    </div>
                    ${(currentUser.role === 'admin' || (currentUser.role === 'official')) ? `
                    <button onclick="deleteAnnouncement(${a.id})"
                        class="btn-icon btn-icon-delete flex-shrink-0" title="Delete">
                        <i class="fas fa-trash"></i>
                    </button>` : ''}
                </div>
            </div>`;
        }).join('');
    }

    function openModal()  { document.getElementById('announcementModal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('announcementModal').classList.add('hidden'); }

    async function postAnnouncement() {
        const title    = document.getElementById('announcementTitle').value.trim();
        const body     = document.getElementById('announcementBody').value.trim();
        const category = document.getElementById('announcementCategory').value;

        if (!title || !body) { toastError('Title and message are required.'); return; }

        const res = await apiPost('/announcements/create.php', { title, body, category });
        if (res.status === 'success') {
            toastSuccess('Announcement posted successfully.');
            document.getElementById('announcementTitle').value = '';
            document.getElementById('announcementBody').value  = '';
            closeModal();
            await loadAnnouncements();
        } else {
            toastError(res.message);
        }
    }

    async function deleteAnnouncement(id) {
        const result = await Swal.fire({
            title: 'Delete Announcement?', icon: 'warning', showCancelButton: true,
            confirmButtonColor: '#dc2626', confirmButtonText: 'Yes, delete it!'
        });
        if (!result.isConfirmed) return;
        const res = await apiDelete('/announcements/delete.php', { id });
        if (res.status === 'success') { toastSuccess(res.message); await loadAnnouncements(); }
        else toastError(res.message);
    }
</script>
</body>
</html>
