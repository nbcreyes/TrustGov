<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TrustGov — Expenses</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"/>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"/>
    <link rel="stylesheet" href="/trustgov/assets/css/theme.css"/>
</head>
<body class="min-h-screen">

    <nav class="navbar fixed top-0 left-0 right-0 z-50 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-blue-500 flex items-center justify-center">
                <i class="fas fa-landmark text-white text-sm"></i>
            </div>
            <span class="font-bold text-white text-lg">TrustGov</span>
        </div>
        <div class="hidden md:flex items-center gap-6 text-sm text-blue-100">
            <a href="dashboard.html" class="hover:text-white"><i class="fas fa-chart-pie mr-1"></i>Dashboard</a>
            <a href="budgets.html" class="hover:text-white"><i class="fas fa-wallet mr-1"></i>Budgets</a>
            <a href="projects.html" class="hover:text-white"><i class="fas fa-project-diagram mr-1"></i>Projects</a>
            <a href="expenses.html" class="text-white font-semibold"><i class="fas fa-receipt mr-1"></i>Expenses</a>
            <a href="feedback.html" class="hover:text-white"><i class="fas fa-comments mr-1"></i>Feedback</a>
            <a href="users.html" class="hover:text-white" id="usersNavLink"><i class="fas fa-users mr-1"></i>Users</a>
        </div>
        <div class="flex items-center gap-3">
            <span id="userNameDisplay" class="text-sm text-blue-100 hidden md:block"></span>
            <span id="userRoleBadge"></span>
            <button id="themeToggleBtn" onclick="toggleTheme()"
                class="w-9 h-9 rounded-full bg-blue-700 hover:bg-blue-600 flex items-center justify-center transition">
            </button>
            <button onclick="logout()" class="text-sm bg-red-600 hover:bg-red-500 text-white px-3 py-1.5 rounded-lg transition">
                <i class="fas fa-sign-out-alt mr-1"></i> Logout
            </button>
        </div>
    </nav>

    <div class="pt-20 px-6 pb-10 max-w-7xl mx-auto">
        <div class="flex items-center justify-between mb-6 animate__animated animate__fadeInDown">
            <div>
                <h2 class="text-2xl font-bold" style="color:var(--text-primary)">Expense Logs</h2>
                <p class="text-sm mt-1" style="color:var(--text-secondary)">Itemized spending records per project.</p>
            </div>
            <div class="flex gap-3 items-center">
                <select id="projectFilter" onchange="loadExpenses()" class="form-input text-sm" style="width:220px">
                    <option value="">All Projects</option>
                </select>
                <button id="addExpenseBtn" onclick="openModal()" class="btn-primary hidden">
                    <i class="fas fa-plus mr-2"></i>Log Expense
                </button>
            </div>
        </div>

        <div class="card p-6 animate__animated animate__fadeInUp">
            <table id="expensesTable" class="w-full text-sm">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Project</th>
                        <th>Description</th>
                        <th>Amount</th>
                        <th>Supplier</th>
                        <th>Receipt #</th>
                        <th>Date</th>
                        <th>Logged By</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="expensesTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div id="expenseModal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay">
        <div class="modal-box w-full max-w-lg p-8 animate__animated animate__zoomIn">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-bold" style="color:var(--text-primary)" id="modalTitle">Log Expense</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 text-xl"><i class="fas fa-times"></i></button>
            </div>
            <input type="hidden" id="expenseId"/>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1" style="color:var(--text-secondary)">Project</label>
                    <select id="expenseProjectId" class="form-input"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" style="color:var(--text-secondary)">Description</label>
                    <input id="expenseDescription" type="text" class="form-input" placeholder="Expense description"/>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1" style="color:var(--text-secondary)">Amount (₱)</label>
                        <input id="expenseAmount" type="number" class="form-input"/>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1" style="color:var(--text-secondary)">Expense Date</label>
                        <input id="expenseDate" type="date" class="form-input"/>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1" style="color:var(--text-secondary)">Supplier</label>
                        <input id="expenseSupplier" type="text" class="form-input" placeholder="Supplier name"/>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1" style="color:var(--text-secondary)">Receipt #</label>
                        <input id="expenseReceipt" type="text" class="form-input" placeholder="RCP-2025-001"/>
                    </div>
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="saveExpense()" class="btn-primary flex-1"><i class="fas fa-save mr-2"></i>Save</button>
                    <button onclick="closeModal()" class="btn-secondary flex-1">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="/trustgov/assets/js/theme.js"></script>
    <script src="/trustgov/assets/js/api.js"></script>
    <script>
        let expensesTable;
        let currentUser;

        document.addEventListener('DOMContentLoaded', async () => {
            currentUser = requireAuth();
            renderNavUser(currentUser);
            if (currentUser.role !== 'admin') document.getElementById('usersNavLink').classList.add('hidden');
            if (currentUser.role === 'official') document.getElementById('addExpenseBtn').classList.remove('hidden');
            await loadProjectFilter();
            await loadExpenses();
        });

        /** Loads projects into filter and modal dropdowns */
        async function loadProjectFilter() {
            const res = await apiGet('/projects/read.php');
            if (res.status !== 'success') return;
            const filterEl = document.getElementById('projectFilter');
            const modalEl  = document.getElementById('expenseProjectId');
            filterEl.innerHTML = '<option value="">All Projects</option>';
            modalEl.innerHTML  = '<option value="">Select project...</option>';
            res.data.forEach(p => {
                filterEl.innerHTML += `<option value="${p.id}">${p.project_name}</option>`;
                modalEl.innerHTML  += `<option value="${p.id}">${p.project_name}</option>`;
            });
        }

        /** Loads expenses, optionally filtered by project */
        async function loadExpenses() {
            const projectId = document.getElementById('projectFilter').value;
            const endpoint  = projectId ? `/expenses/read.php?project_id=${projectId}` : '/expenses/read.php';
            const res = await apiGet(endpoint);
            if (res.status !== 'success') { toastError('Failed to load expenses.'); return; }

            const tbody = document.getElementById('expensesTableBody');
            tbody.innerHTML = res.data.map(e => `
                <tr>
                    <td>${e.id}</td>
                    <td>${e.project_name}</td>
                    <td>${e.description}</td>
                    <td>₱${parseFloat(e.amount).toLocaleString()}</td>
                    <td>${e.supplier || '—'}</td>
                    <td>${e.receipt_number || '—'}</td>
                    <td>${e.expense_date}</td>
                    <td>${e.logged_by_name}</td>
                    <td>
                        <div class="flex gap-2 justify-center">
                            ${currentUser.role === 'official' ? `
                            <button onclick='editExpense(${JSON.stringify(e)})'
                                class="text-blue-500 hover:text-blue-700 px-2 py-1 rounded text-xs"
                                style="background:var(--bg-primary)">
                                <i class="fas fa-edit mr-1"></i>Edit
                            </button>` : ''}
                            ${currentUser.role === 'admin' ? `
                            <button onclick="deleteExpense(${e.id})"
                                class="text-red-500 hover:text-red-700 px-2 py-1 rounded text-xs"
                                style="background:var(--bg-primary)">
                                <i class="fas fa-trash mr-1"></i>Delete
                            </button>` : ''}
                            ${!['official','admin'].includes(currentUser.role) ? `<span class="text-xs" style="color:var(--text-secondary)">—</span>` : ''}
                        </div>
                    </td>
                </tr>`).join('');

            if (expensesTable) { expensesTable.destroy(); }
            expensesTable = $('#expensesTable').DataTable({
                pageLength: 10,
                columnDefs: [
                    { targets: -1, orderable: false, searchable: false, className: 'dt-center' }
                ]
            });
        }

        function openModal() {
            document.getElementById('modalTitle').textContent   = 'Log Expense';
            document.getElementById('expenseId').value          = '';
            document.getElementById('expenseDescription').value = '';
            document.getElementById('expenseAmount').value      = '';
            document.getElementById('expenseDate').value        = '';
            document.getElementById('expenseSupplier').value    = '';
            document.getElementById('expenseReceipt').value     = '';
            document.getElementById('expenseModal').classList.remove('hidden');
        }

        function editExpense(e) {
            document.getElementById('modalTitle').textContent   = 'Edit Expense';
            document.getElementById('expenseId').value          = e.id;
            document.getElementById('expenseProjectId').value   = e.project_id;
            document.getElementById('expenseDescription').value = e.description;
            document.getElementById('expenseAmount').value      = e.amount;
            document.getElementById('expenseDate').value        = e.expense_date;
            document.getElementById('expenseSupplier').value    = e.supplier    || '';
            document.getElementById('expenseReceipt').value     = e.receipt_number || '';
            document.getElementById('expenseModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('expenseModal').classList.add('hidden'); }

        async function saveExpense() {
            const id             = document.getElementById('expenseId').value;
            const project_id     = document.getElementById('expenseProjectId').value;
            const description    = document.getElementById('expenseDescription').value.trim();
            const amount         = document.getElementById('expenseAmount').value;
            const expense_date   = document.getElementById('expenseDate').value;
            const supplier       = document.getElementById('expenseSupplier').value.trim();
            const receipt_number = document.getElementById('expenseReceipt').value.trim();

            if (!project_id || !description || !amount || !expense_date) {
                toastError('Project, description, amount, and date are required.');
                return;
            }

            let res;
            if (id) {
                res = await apiPut('/expenses/update.php', { id, project_id, description, amount, expense_date, supplier, receipt_number });
            } else {
                res = await apiPost('/expenses/create.php', { project_id, description, amount, expense_date, supplier, receipt_number });
            }

            if (res.status === 'success') { toastSuccess(res.message); closeModal(); await loadExpenses(); }
            else toastError(res.message);
        }

        async function deleteExpense(id) {
            const result = await Swal.fire({
                title: 'Delete Expense?',
                text: 'This action cannot be undone.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc2626',
                confirmButtonText: 'Yes, delete it!'
            });
            if (!result.isConfirmed) return;
            const res = await apiDelete('/expenses/delete.php', { id });
            if (res.status === 'success') { toastSuccess(res.message); await loadExpenses(); }
            else toastError(res.message);
        }
    </script>
</body>
</html>
