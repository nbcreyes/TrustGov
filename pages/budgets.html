<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrustGov — Budgets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"
    />
    <link rel="stylesheet" href="/trustgov/assets/css/theme.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <i class="fas fa-landmark text-white text-sm"></i>
        </div>
        <div>
          <div class="sidebar-logo-text">TrustGov</div>
          <div class="sidebar-logo-sub">Budget Transparency Portal</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Main Menu</div>
        <a href="dashboard.html" class="sidebar-link"
          ><span class="link-icon"><i class="fas fa-chart-pie"></i></span
          >Dashboard</a
        >
        <a href="budgets.html" class="sidebar-link active"
          ><span class="link-icon"><i class="fas fa-wallet"></i></span
          >Budgets</a
        >
        <a href="projects.html" class="sidebar-link"
          ><span class="link-icon"><i class="fas fa-project-diagram"></i></span
          >Projects</a
        >
        <a href="expenses.html" class="sidebar-link"
          ><span class="link-icon"><i class="fas fa-receipt"></i></span
          >Expenses</a
        >
        <a href="feedback.html" class="sidebar-link"
          ><span class="link-icon"><i class="fas fa-comments"></i></span
          >Feedback</a
        >
        <div
          class="sidebar-section-label"
          id="adminSection"
          style="display: none"
        >
          Admin
        </div>
        <a
          href="users.html"
          class="sidebar-link"
          id="usersNavLink"
          style="display: none"
          ><span class="link-icon"><i class="fas fa-users"></i></span>Users</a
        >
        <a
          href="audit.html"
          class="sidebar-link"
          id="auditNavLink"
          style="display: none"
          ><span class="link-icon"><i class="fas fa-clipboard-list"></i></span
          >Audit Log</a
        >
        <div class="sidebar-section-label">Account</div>
        <a href="profile.html" class="sidebar-link"
          ><span class="link-icon"><i class="fas fa-user-circle"></i></span>My
          Profile</a
        >
        <a href="announcements.html" class="sidebar-link"
          ><span class="link-icon"><i class="fas fa-bullhorn"></i></span
          >Announcements</a
        >
        <a href="reports.html" class="sidebar-link"
          ><span class="link-icon"><i class="fas fa-file-alt"></i></span
          >Reports</a
        >
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-avatar" id="sidebarAvatar">J</div>
        <div style="flex: 1; min-width: 0">
          <div class="sidebar-user-name" id="sidebarUserName">Loading...</div>
          <div class="sidebar-user-role" id="sidebarUserRole">—</div>
        </div>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="top-header">
        <div>
          <h1 class="header-title">Budget Registry</h1>
          <p
            style="
              font-size: 0.75rem;
              color: var(--text-secondary);
              margin-top: 0.1rem;
            "
          >
            Manage barangay budget allocations.
          </p>
        </div>
        <div class="header-actions">
          <button
            onclick="window.print()"
            class="btn-secondary"
            style="padding: 0.4rem 1rem; font-size: 0.8rem"
          >
            <i class="fas fa-print"></i> Print
          </button>
          <button
            id="addBudgetBtn"
            onclick="openModal()"
            class="btn-primary hidden"
            style="padding: 0.4rem 1rem; font-size: 0.8rem"
          >
            <i class="fas fa-plus"></i> Add Budget
          </button>
          <button
            id="themeToggleBtn"
            onclick="toggleTheme()"
            class="theme-toggle"
          >
            <i class="fas fa-moon" style="color: var(--text-secondary)"></i>
          </button>
          <button
            onclick="logout()"
            class="btn-danger"
            style="padding: 0.4rem 1rem; font-size: 0.8rem"
          >
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </header>
      <div class="page-content">
        <div class="card p-6 animate__animated animate__fadeInUp">
          <table id="budgetsTable" class="w-full text-sm">
            <thead>
              <tr>
                <th>ID</th>
                <th>Barangay</th>
                <th>Year</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Posted By</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="budgetsTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Modal -->
    <div
      id="budgetModal"
      class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay"
    >
      <div
        class="modal-box w-full max-w-lg p-8 animate__animated animate__zoomIn"
      >
        <div class="flex items-center justify-between mb-6">
          <h3
            class="text-lg font-bold"
            style="color: var(--text-primary)"
            id="modalTitle"
          >
            Add Budget
          </h3>
          <button onclick="closeModal()" class="btn-icon btn-icon-delete">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <input type="hidden" id="budgetId" />
        <div class="space-y-4">
          <div>
            <label
              class="block text-sm font-medium mb-1"
              style="color: var(--text-secondary)"
              >Barangay Name</label
            >
            <select id="budgetBarangay" class="form-input">
              <option value="">Select barangay...</option>
              <option>Barangay Poblacion</option>
              <option>Barangay Bagong Silang</option>
              <option>Barangay Sta. Cruz</option>
              <option>Barangay San Isidro</option>
              <option>Barangay Maligaya</option>
              <option>Barangay Masagana</option>
              <option>Barangay Pag-asa</option>
              <option>Barangay Rizal</option>
              <option>Barangay Laging Handa</option>
              <option>Barangay Mabuhay</option>
            </select>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label
                class="block text-sm font-medium mb-1"
                style="color: var(--text-secondary)"
                >Fiscal Year</label
              >
              <input
                id="budgetYear"
                type="number"
                class="form-input"
                placeholder="2026"
              />
            </div>
            <div>
              <label
                class="block text-sm font-medium mb-1"
                style="color: var(--text-secondary)"
                >Total Amount (₱)</label
              >
              <input
                id="budgetAmount"
                type="number"
                class="form-input"
                placeholder="500000"
              />
            </div>
          </div>
          <div>
            <label
              class="block text-sm font-medium mb-1"
              style="color: var(--text-secondary)"
              >Category</label
            >
            <select id="budgetCategory" class="form-input">
              <option value="">Select category...</option>
              <option value="health">Health</option>
              <option value="infrastructure">Infrastructure</option>
              <option value="livelihood">Livelihood</option>
              <option value="admin">Admin</option>
              <option value="education">Education</option>
              <option value="others">Others</option>
            </select>
          </div>
          <div>
            <label
              class="block text-sm font-medium mb-1"
              style="color: var(--text-secondary)"
              >Description</label
            >
            <textarea
              id="budgetDescription"
              class="form-input"
              rows="3"
              placeholder="Budget description..."
            ></textarea>
          </div>
          <div class="flex gap-3 pt-2">
            <button onclick="saveBudget()" class="btn-primary flex-1">
              <i class="fas fa-save"></i> Save Budget
            </button>
            <button onclick="closeModal()" class="btn-secondary flex-1">
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="/trustgov/assets/js/theme.js"></script>
    <script src="/trustgov/assets/js/api.js"></script>
    <script>
      let budgetsTable, currentUser;

      document.addEventListener("DOMContentLoaded", async () => {
        currentUser = requireAuth();
        renderSidebar(currentUser);
        if (currentUser.role === "official")
          document.getElementById("addBudgetBtn").classList.remove("hidden");
        await loadBudgets();
      });

      async function loadBudgets() {
        const res = await apiGet("/budgets/read.php");
        if (res.status !== "success") {
          toastError("Failed to load budgets.");
          return;
        }
        const tbody = document.getElementById("budgetsTableBody");
        tbody.innerHTML = res.data
          .map(
            (b) => `
            <tr>
                <td>${b.id}</td>
                <td>${b.barangay_name}</td>
                <td>${b.fiscal_year}</td>
                <td><span class="capitalize px-2 py-0.5 rounded-full text-xs font-semibold"
                    style="background:var(--accent-light);color:var(--accent)">${b.category}</span></td>
                <td>₱${parseFloat(b.total_amount).toLocaleString()}</td>
                <td>${b.posted_by_name}</td>
                <td>${b.created_at.slice(0, 10)}</td>
                <td>
                    <div class="flex gap-1 justify-center">
                        ${
                          currentUser.role === "official"
                            ? `
                        <button onclick="editBudget(${b.id},'${b.barangay_name}',${b.fiscal_year},${b.total_amount},'${b.category}','${(b.description || "").replace(/'/g, "\\'")}')"
                            class="btn-icon btn-icon-edit" title="Edit"><i class="fas fa-edit"></i></button>`
                            : ""
                        }
                        ${
                          currentUser.role === "admin"
                            ? `
                        <button onclick="deleteBudget(${b.id})"
                            class="btn-icon btn-icon-delete" title="Delete"><i class="fas fa-trash"></i></button>`
                            : ""
                        }
                    </div>
                </td>
            </tr>`,
          )
          .join("");
        if (budgetsTable) budgetsTable.destroy();
        budgetsTable = $("#budgetsTable").DataTable({
          pageLength: 10,
          columnDefs: [
            {
              targets: -1,
              orderable: false,
              searchable: false,
              className: "dt-center",
            },
          ],
        });
      }

      function openModal() {
        document.getElementById("modalTitle").textContent = "Add Budget";
        document.getElementById("budgetId").value = "";
        document.getElementById("budgetBarangay").value = "";
        document.getElementById("budgetYear").value = "";
        document.getElementById("budgetAmount").value = "";
        document.getElementById("budgetCategory").value = "";
        document.getElementById("budgetDescription").value = "";
        document.getElementById("budgetModal").classList.remove("hidden");
      }

      function editBudget(id, barangay, year, amount, category, description) {
        document.getElementById("modalTitle").textContent = "Edit Budget";
        document.getElementById("budgetId").value = id;
        document.getElementById("budgetBarangay").value = barangay;
        document.getElementById("budgetYear").value = year;
        document.getElementById("budgetAmount").value = amount;
        document.getElementById("budgetCategory").value = category;
        document.getElementById("budgetDescription").value = description;
        document.getElementById("budgetModal").classList.remove("hidden");
      }

      function closeModal() {
        document.getElementById("budgetModal").classList.add("hidden");
      }

      async function saveBudget() {
        const id = document.getElementById("budgetId").value;
        const barangay_name = document.getElementById("budgetBarangay").value;
        const fiscal_year = document.getElementById("budgetYear").value;
        const total_amount = document.getElementById("budgetAmount").value;
        const category = document.getElementById("budgetCategory").value;
        const description = document
          .getElementById("budgetDescription")
          .value.trim();
        if (!barangay_name || !fiscal_year || !total_amount || !category) {
          toastError("Please fill in all required fields.");
          return;
        }
        let res;
        if (id)
          res = await apiPut("/budgets/update.php", {
            id,
            barangay_name,
            fiscal_year,
            total_amount,
            category,
            description,
          });
        else
          res = await apiPost("/budgets/create.php", {
            barangay_name,
            fiscal_year,
            total_amount,
            category,
            description,
          });
        if (res.status === "success") {
          toastSuccess(res.message);
          closeModal();
          await loadBudgets();
        } else toastError(res.message);
      }

      async function deleteBudget(id) {
        const result = await Swal.fire({
          title: "Delete Budget?",
          text: "This will also delete all linked projects and expenses.",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#dc2626",
          confirmButtonText: "Yes, delete it!",
        });
        if (!result.isConfirmed) return;
        const res = await apiDelete("/budgets/delete.php", { id });
        if (res.status === "success") {
          toastSuccess(res.message);
          await loadBudgets();
        } else toastError(res.message);
      }
    </script>
  </body>
</html>
