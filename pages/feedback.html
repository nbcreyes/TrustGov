<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrustGov — Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />
    <link rel="stylesheet" href="/trustgov/assets/css/theme.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <i class="fas fa-landmark text-white text-sm"></i>
        </div>
        <div>
          <div class="sidebar-logo-text">TrustGov</div>
          <div class="sidebar-logo-sub">Budget Transparency Portal</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Main Menu</div>
        <a href="dashboard.html" class="sidebar-link"
          ><span class="link-icon"><i class="fas fa-chart-pie"></i></span
          >Dashboard</a
        >
        <a href="budgets.html" class="sidebar-link"
          ><span class="link-icon"><i class="fas fa-wallet"></i></span
          >Budgets</a
        >
        <a href="projects.html" class="sidebar-link"
          ><span class="link-icon"><i class="fas fa-project-diagram"></i></span
          >Projects</a
        >
        <a href="expenses.html" class="sidebar-link"
          ><span class="link-icon"><i class="fas fa-receipt"></i></span
          >Expenses</a
        >
        <a href="feedback.html" class="sidebar-link active"
          ><span class="link-icon"><i class="fas fa-comments"></i></span
          >Feedback</a
        >
        <div
          class="sidebar-section-label"
          id="adminSection"
          style="display: none"
        >
          Admin
        </div>
        <a
          href="users.html"
          class="sidebar-link"
          id="usersNavLink"
          style="display: none"
          ><span class="link-icon"><i class="fas fa-users"></i></span>Users</a
        >
        <a
          href="audit.html"
          class="sidebar-link"
          id="auditNavLink"
          style="display: none"
          ><span class="link-icon"><i class="fas fa-clipboard-list"></i></span
          >Audit Log</a
        >
        <div class="sidebar-section-label">Account</div>
        <a href="profile.html" class="sidebar-link"
          ><span class="link-icon"><i class="fas fa-user-circle"></i></span>My
          Profile</a
        >
        <a href="announcements.html" class="sidebar-link"
          ><span class="link-icon"><i class="fas fa-bullhorn"></i></span
          >Announcements</a
        >
        <a href="reports.html" class="sidebar-link"
          ><span class="link-icon"><i class="fas fa-file-alt"></i></span
          >Reports</a
        >
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-avatar" id="sidebarAvatar">J</div>
        <div style="flex: 1; min-width: 0">
          <div class="sidebar-user-name" id="sidebarUserName">Loading...</div>
          <div class="sidebar-user-role" id="sidebarUserRole">—</div>
        </div>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="top-header">
        <div>
          <h1 class="header-title">Citizen Feedback</h1>
          <p
            style="
              font-size: 0.75rem;
              color: var(--text-secondary);
              margin-top: 0.1rem;
            "
          >
            Community comments and reports on barangay projects.
          </p>
        </div>
        <div class="header-actions">
          <select
            id="projectFilter"
            onchange="loadFeedback()"
            class="form-input text-sm"
            style="width: 200px"
          >
            <option value="">All Projects</option>
          </select>
          <select
            id="statusFilter"
            onchange="loadFeedback()"
            class="form-input text-sm"
            style="width: 140px"
          >
            <option value="">All Statuses</option>
            <option value="pending">Pending</option>
            <option value="reviewed">Reviewed</option>
            <option value="resolved">Resolved</option>
          </select>
          <button
            onclick="window.print()"
            class="btn-secondary"
            style="padding: 0.4rem 1rem; font-size: 0.8rem"
          >
            <i class="fas fa-print"></i> Print
          </button>
          <button
            id="addFeedbackBtn"
            onclick="openModal()"
            class="btn-primary hidden"
            style="padding: 0.4rem 1rem; font-size: 0.8rem"
          >
            <i class="fas fa-plus"></i> Submit Feedback
          </button>
          <button
            id="themeToggleBtn"
            onclick="toggleTheme()"
            class="theme-toggle"
          >
            <i class="fas fa-moon" style="color: var(--text-secondary)"></i>
          </button>
          <button
            onclick="logout()"
            class="btn-danger"
            style="padding: 0.4rem 1rem; font-size: 0.8rem"
          >
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </header>
      <div class="page-content">
        <div
          id="feedbackSummaryCards"
          class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6"
        ></div>
        <div
          id="feedbackFeed"
          class="grid grid-cols-1 lg:grid-cols-2 gap-4"
        ></div>
      </div>
    </div>

    <!-- Submit Feedback Modal -->
    <div
      id="feedbackModal"
      class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay"
    >
      <div
        class="modal-box w-full max-w-lg p-8 animate__animated animate__zoomIn"
      >
        <div class="flex items-center justify-between mb-6">
          <h3
            class="text-lg font-bold"
            style="color: var(--text-primary)"
            id="feedbackModalTitle"
          >
            Submit Feedback
          </h3>
          <button onclick="closeModal()" class="btn-icon btn-icon-delete">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <input type="hidden" id="feedbackEditId" />
        <div class="space-y-4">
          <div id="feedbackProjectRow">
            <label
              class="block text-sm font-medium mb-1"
              style="color: var(--text-secondary)"
              >Project</label
            >
            <select id="feedbackProjectId" class="form-input"></select>
          </div>
          <div>
            <label
              class="block text-sm font-medium mb-1"
              style="color: var(--text-secondary)"
              >Your Comment</label
            >
            <textarea
              id="feedbackComment"
              class="form-input"
              rows="4"
              placeholder="Share your feedback..."
            ></textarea>
          </div>
          <div class="flex gap-3 pt-2">
            <button onclick="submitFeedback()" class="btn-primary flex-1">
              <i class="fas fa-paper-plane"></i> Submit
            </button>
            <button onclick="closeModal()" class="btn-secondary flex-1">
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/trustgov/assets/js/theme.js"></script>
    <script src="/trustgov/assets/js/api.js"></script>
    <script>
      let currentUser;

      document.addEventListener("DOMContentLoaded", async () => {
        currentUser = requireAuth();
        renderSidebar(currentUser);
        if (currentUser.role === "citizen")
          document.getElementById("addFeedbackBtn").classList.remove("hidden");
        await loadProjectFilter();
        await loadFeedback();
      });

      async function loadProjectFilter() {
        const res = await apiGet("/projects/read.php");
        if (res.status !== "success") return;
        const filterEl = document.getElementById("projectFilter");
        const modalEl = document.getElementById("feedbackProjectId");
        filterEl.innerHTML = '<option value="">All Projects</option>';
        modalEl.innerHTML = '<option value="">Select project...</option>';
        res.data.forEach((p) => {
          filterEl.innerHTML += `<option value="${p.id}">${p.project_name}</option>`;
          modalEl.innerHTML += `<option value="${p.id}">${p.project_name}</option>`;
        });
      }

      function renderSummaryCards(data) {
        const total = data.length;
        const pending = data.filter((f) => f.status === "pending").length;
        const flagged = data.filter((f) => f.flag_suspicious == 1).length;
        document.getElementById("feedbackSummaryCards").innerHTML = `
            <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#7c3aed,#6d28d9)"><i class="fas fa-comments"></i></div><div><div class="stat-label">Total Feedback</div><div class="stat-value">${total}</div></div></div>
            <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#f59e0b,#d97706)"><i class="fas fa-clock"></i></div><div><div class="stat-label">Pending Review</div><div class="stat-value">${pending}</div></div></div>
            <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#dc2626,#b91c1c)"><i class="fas fa-flag"></i></div><div><div class="stat-label">Flagged</div><div class="stat-value">${flagged}</div></div></div>`;
      }

      async function loadFeedback() {
        const projectId = document.getElementById("projectFilter").value;
        const statusFilter = document.getElementById("statusFilter").value;
        const endpoint = projectId
          ? `/feedback/read.php?project_id=${projectId}`
          : "/feedback/read.php";
        const res = await apiGet(endpoint);
        const feed = document.getElementById("feedbackFeed");

        if (res.status !== "success" || res.data.length === 0) {
          renderSummaryCards([]);
          feed.innerHTML = `<div class="col-span-2 card p-12 text-center"><i class="fas fa-comments text-5xl mb-4" style="color:var(--border-color)"></i><p style="color:var(--text-secondary)">No feedback found.</p></div>`;
          return;
        }

        let data = statusFilter
          ? res.data.filter((f) => f.status === statusFilter)
          : res.data;
        renderSummaryCards(res.data);

        const statusColors = {
          pending: "#f59e0b",
          reviewed: "#2563eb",
          resolved: "#16a34a",
        };
        const statusLabels = {
          pending: "Pending",
          reviewed: "Reviewed",
          resolved: "Resolved",
        };

        feed.innerHTML = data
          .map((f) => {
            // Check if this feedback belongs to the current citizen
            const isOwner =
              currentUser.role === "citizen" && f.citizen_id == currentUser.id;
            return `
            <div class="feedback-card animate__animated animate__fadeInUp ${f.flag_suspicious == 1 ? "flagged" : ""}">
                <div class="flex items-start justify-between gap-3 mb-3">
                    <div class="flex items-center gap-2">
                        <div style="width:2rem;height:2rem;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#7c3aed);
                            display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.75rem;font-weight:700;flex-shrink:0">
                            ${f.citizen_name.charAt(0).toUpperCase()}
                        </div>
                        <div>
                            <p style="font-size:0.8rem;font-weight:600;color:var(--text-primary)">${f.citizen_name}</p>
                            <p style="font-size:0.7rem;color:var(--text-secondary)">${f.created_at.slice(0, 10)}</p>
                        </div>
                    </div>
                    <span style="background:${statusColors[f.status]}20;color:${statusColors[f.status]};
                        padding:0.2rem 0.6rem;border-radius:9999px;font-size:0.7rem;font-weight:700;white-space:nowrap">
                        ${statusLabels[f.status]}
                    </span>
                </div>
                <p style="font-size:0.875rem;color:var(--text-primary);line-height:1.5;margin-bottom:0.75rem">${f.comment}</p>
                <div style="display:inline-flex;align-items:center;gap:0.375rem;background:var(--accent-light);
                    color:var(--accent);padding:0.2rem 0.625rem;border-radius:0.375rem;font-size:0.75rem;font-weight:500;margin-bottom:0.875rem">
                    <i class="fas fa-project-diagram" style="font-size:0.65rem"></i>${f.project_name}
                </div>
                <div class="flex items-center gap-2 flex-wrap" style="border-top:1px solid var(--border-color);padding-top:0.75rem">
                    <button onclick="upvoteFeedback(${f.id})"
                        style="display:flex;align-items:center;gap:0.375rem;padding:0.3rem 0.75rem;border-radius:0.375rem;
                        border:1px solid var(--border-color);background:var(--bg-primary);cursor:pointer;
                        color:var(--text-secondary);font-size:0.8rem;transition:all 0.15s"
                        onmouseover="this.style.borderColor='#2563eb';this.style.color='#2563eb'"
                        onmouseout="this.style.borderColor='var(--border-color)';this.style.color='var(--text-secondary)'">
                        <i class="fas fa-thumbs-up" style="color:#2563eb"></i><span>${f.upvotes}</span>
                    </button>
                    ${
                      f.flag_suspicious == 0
                        ? `
                    <button onclick="flagFeedback(${f.id})"
                        style="display:flex;align-items:center;gap:0.375rem;padding:0.3rem 0.75rem;border-radius:0.375rem;
                        border:1px solid var(--border-color);background:var(--bg-primary);cursor:pointer;
                        color:var(--text-secondary);font-size:0.8rem;transition:all 0.15s"
                        onmouseover="this.style.borderColor='#dc2626';this.style.color='#dc2626'"
                        onmouseout="this.style.borderColor='var(--border-color)';this.style.color='var(--text-secondary)'">
                        <i class="fas fa-flag" style="color:#dc2626"></i> Flag
                    </button>`
                        : `
                    <span style="display:flex;align-items:center;gap:0.375rem;padding:0.3rem 0.75rem;border-radius:0.375rem;
                        background:#fef2f2;color:#dc2626;font-size:0.8rem;font-weight:600">
                        <i class="fas fa-flag"></i> Flagged
                    </span>`
                    }

                    ${
                      ["official", "admin"].includes(currentUser.role)
                        ? `
                    <select onchange="updateStatus(${f.id}, this.value)"
                        style="margin-left:auto;padding:0.3rem 0.5rem;border-radius:0.375rem;font-size:0.8rem;
                        border:1px solid var(--border-color);background:var(--bg-primary);color:var(--text-primary);cursor:pointer">
                        <option value="pending"  ${f.status === "pending" ? "selected" : ""}>Pending</option>
                        <option value="reviewed" ${f.status === "reviewed" ? "selected" : ""}>Reviewed</option>
                        <option value="resolved" ${f.status === "resolved" ? "selected" : ""}>Resolved</option>
                    </select>`
                        : ""
                    }

                    ${
                      isOwner
                        ? `
                    <button onclick="openEditFeedback(${f.id}, ${f.project_id}, '${f.comment.replace(/'/g, "\\'")}')"
                        class="btn-icon btn-icon-edit" title="Edit" ${["official", "admin"].includes(currentUser.role) ? "" : 'style="margin-left:auto"'}>
                        <i class="fas fa-edit"></i>
                    </button>
                    <button onclick="deleteFeedback(${f.id})" class="btn-icon btn-icon-delete" title="Delete">
                        <i class="fas fa-trash"></i>
                    </button>`
                        : ""
                    }

                    ${
                      currentUser.role === "admin" && !isOwner
                        ? `
                    <button onclick="deleteFeedback(${f.id})" class="btn-icon btn-icon-delete" title="Delete" style="margin-left:auto">
                        <i class="fas fa-trash"></i>
                    </button>`
                        : ""
                    }
                </div>
            </div>`;
          })
          .join("");
      }

      function openModal() {
        document.getElementById("feedbackModalTitle").textContent =
          "Submit Feedback";
        document.getElementById("feedbackEditId").value = "";
        document.getElementById("feedbackComment").value = "";
        document.getElementById("feedbackProjectRow").style.display = "block";
        document.getElementById("feedbackModal").classList.remove("hidden");
      }

      function openEditFeedback(id, project_id, comment) {
        document.getElementById("feedbackModalTitle").textContent =
          "Edit Feedback";
        document.getElementById("feedbackEditId").value = id;
        document.getElementById("feedbackProjectId").value = project_id;
        document.getElementById("feedbackComment").value = comment;
        document.getElementById("feedbackProjectRow").style.display = "none";
        document.getElementById("feedbackModal").classList.remove("hidden");
      }

      function closeModal() {
        document.getElementById("feedbackModal").classList.add("hidden");
      }

      async function submitFeedback() {
        const editId = document.getElementById("feedbackEditId").value;
        const project_id = document.getElementById("feedbackProjectId").value;
        const comment = document.getElementById("feedbackComment").value.trim();

        if (!comment) {
          toastError("Please write a comment.");
          return;
        }

        let res;
        if (editId) {
          res = await apiPut("/feedback/update.php", {
            id: editId,
            action: "edit",
            comment,
          });
        } else {
          if (!project_id) {
            toastError("Please select a project.");
            return;
          }
          res = await apiPost("/feedback/create.php", { project_id, comment });
        }

        if (res.status === "success") {
          toastSuccess(res.message);
          closeModal();
          await loadFeedback();
        } else toastError(res.message);
      }

      async function upvoteFeedback(id) {
        const res = await apiPut("/feedback/update.php", {
          id,
          action: "upvote",
        });
        if (res.status === "success") await loadFeedback();
        else toastError(res.message);
      }

      async function flagFeedback(id) {
        const res = await apiPut("/feedback/update.php", {
          id,
          action: "flag",
        });
        if (res.status === "success") {
          toastSuccess("Feedback flagged.");
          await loadFeedback();
        } else toastError(res.message);
      }

      async function updateStatus(id, status) {
        const res = await apiPut("/feedback/update.php", {
          id,
          action: "status_update",
          status,
        });
        if (res.status === "success") {
          toastSuccess("Status updated.");
          await loadFeedback();
        } else toastError(res.message);
      }

      async function deleteFeedback(id) {
        const result = await Swal.fire({
          title: "Delete Feedback?",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#dc2626",
          confirmButtonText: "Yes, delete it!",
        });
        if (!result.isConfirmed) return;
        const res = await apiDelete("/feedback/delete.php", { id });
        if (res.status === "success") {
          toastSuccess(res.message);
          await loadFeedback();
        } else toastError(res.message);
      }
    </script>
  </body>
</html>
