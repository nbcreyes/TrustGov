<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TrustGov — Audit Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"/>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"/>
    <link rel="stylesheet" href="/trustgov/assets/css/theme.css"/>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-icon"><i class="fas fa-landmark text-white text-sm"></i></div>
        <div><div class="sidebar-logo-text">TrustGov</div><div class="sidebar-logo-sub">Budget Transparency Portal</div></div>
    </div>
    <nav class="sidebar-nav">
        <div class="sidebar-section-label">Main Menu</div>
        <a href="dashboard.html" class="sidebar-link"><span class="link-icon"><i class="fas fa-chart-pie"></i></span>Dashboard</a>
        <a href="budgets.html" class="sidebar-link"><span class="link-icon"><i class="fas fa-wallet"></i></span>Budgets</a>
        <a href="projects.html" class="sidebar-link"><span class="link-icon"><i class="fas fa-project-diagram"></i></span>Projects</a>
        <a href="expenses.html" class="sidebar-link"><span class="link-icon"><i class="fas fa-receipt"></i></span>Expenses</a>
        <a href="feedback.html" class="sidebar-link"><span class="link-icon"><i class="fas fa-comments"></i></span>Feedback</a>
        <div class="sidebar-section-label">Admin</div>
        <a href="users.html" class="sidebar-link"><span class="link-icon"><i class="fas fa-users"></i></span>Users</a>
        <a href="audit.html" class="sidebar-link active"><span class="link-icon"><i class="fas fa-clipboard-list"></i></span>Audit Log</a>
        <div class="sidebar-section-label">Account</div>
        <a href="profile.html" class="sidebar-link"><span class="link-icon"><i class="fas fa-user-circle"></i></span>My Profile</a>
        <a href="announcements.html" class="sidebar-link"><span class="link-icon"><i class="fas fa-bullhorn"></i></span>Announcements</a>
        <a href="reports.html" class="sidebar-link"><span class="link-icon"><i class="fas fa-file-alt"></i></span>Reports</a>
    </nav>
    <div class="sidebar-footer">
        <div class="sidebar-avatar" id="sidebarAvatar">J</div>
        <div style="flex:1;min-width:0">
            <div class="sidebar-user-name" id="sidebarUserName">Loading...</div>
            <div class="sidebar-user-role" id="sidebarUserRole">—</div>
        </div>
    </div>
</aside>

<div class="main-wrapper">
    <header class="top-header">
        <div>
            <h1 class="header-title">Audit Log</h1>
            <p style="font-size:0.75rem;color:var(--text-secondary);margin-top:0.1rem">Full record of all system actions across all modules.</p>
        </div>
        <div class="header-actions">
            <select id="moduleFilter" onchange="filterTable()" class="form-input text-sm" style="width:150px">
                <option value="">All Modules</option>
                <option value="budgets">Budgets</option>
                <option value="projects">Projects</option>
                <option value="expenses">Expenses</option>
                <option value="feedback">Feedback</option>
                <option value="users">Users</option>
                <option value="announcements">Announcements</option>
            </select>
            <select id="actionFilter" onchange="filterTable()" class="form-input text-sm" style="width:140px">
                <option value="">All Actions</option>
                <option value="CREATE">Create</option>
                <option value="UPDATE">Update</option>
                <option value="DELETE">Delete</option>
            </select>
            <button onclick="window.print()" class="btn-secondary" style="padding:0.4rem 1rem;font-size:0.8rem"><i class="fas fa-print"></i> Print</button>
            <button id="themeToggleBtn" onclick="toggleTheme()" class="theme-toggle"><i class="fas fa-moon" style="color:var(--text-secondary)"></i></button>
            <button onclick="logout()" class="btn-danger" style="padding:0.4rem 1rem;font-size:0.8rem"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </header>
    <div class="page-content">
        <div id="auditSummaryCards" class="grid grid-cols-1 sm:grid-cols-4 gap-4 mb-6"></div>
        <div class="card p-6 animate__animated animate__fadeInUp">
            <table id="auditTable" class="w-full text-sm">
                <thead>
                    <tr><th>ID</th><th>User</th><th>Role</th><th>Barangay</th><th>Action</th><th>Module</th><th>Description</th><th>Timestamp</th></tr>
                </thead>
                <tbody id="auditTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="/trustgov/assets/js/theme.js"></script>
<script src="/trustgov/assets/js/api.js"></script>
<script>
    let auditTable, currentUser, allLogs = [];

    document.addEventListener('DOMContentLoaded', async () => {
        currentUser = requireAuth();
        if (currentUser.role !== 'admin') { window.location.href = 'dashboard.html'; return; }
        renderSidebar(currentUser);
        await loadAuditLog();
    });

    function renderSummaryCards(logs) {
        const total   = logs.length;
        const creates = logs.filter(l => l.action === 'CREATE').length;
        const updates = logs.filter(l => l.action === 'UPDATE').length;
        const deletes = logs.filter(l => l.action === 'DELETE').length;
        document.getElementById('auditSummaryCards').innerHTML = `
            <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#2563eb,#1d4ed8)"><i class="fas fa-clipboard-list"></i></div><div><div class="stat-label">Total Logs</div><div class="stat-value">${total}</div></div></div>
            <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#16a34a,#15803d)"><i class="fas fa-plus-circle"></i></div><div><div class="stat-label">Creates</div><div class="stat-value">${creates}</div></div></div>
            <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#d97706,#b45309)"><i class="fas fa-edit"></i></div><div><div class="stat-label">Updates</div><div class="stat-value">${updates}</div></div></div>
            <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#dc2626,#b91c1c)"><i class="fas fa-trash"></i></div><div><div class="stat-label">Deletes</div><div class="stat-value">${deletes}</div></div></div>`;
    }

    function actionBadgeStyle(action) {
        const map = { CREATE: 'background:#dcfce7;color:#16a34a', UPDATE: 'background:#fef3c7;color:#d97706', DELETE: 'background:#fee2e2;color:#dc2626' };
        return map[action] || 'background:var(--bg-primary);color:var(--text-secondary)';
    }

    function moduleColor(module) {
        const map = { budgets:'#2563eb', projects:'#d97706', expenses:'#16a34a', feedback:'#7c3aed', users:'#0891b2', announcements:'#ec4899' };
        return map[module] || '#94a3b8';
    }

    function renderRows(logs) {
        const tbody = document.getElementById('auditTableBody');
        tbody.innerHTML = logs.map(l => `
            <tr>
                <td style="color:var(--text-secondary)">${l.id}</td>
                <td><div class="flex items-center gap-2">
                    <div style="width:1.75rem;height:1.75rem;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.7rem;font-weight:700;flex-shrink:0">${l.full_name.charAt(0).toUpperCase()}</div>
                    <span class="font-medium" style="color:var(--text-primary)">${l.full_name}</span>
                </div></td>
                <td><span class="badge-${l.role}">${l.role.toUpperCase()}</span></td>
                <td style="color:var(--text-secondary);font-size:0.8rem">${l.barangay}</td>
                <td><span style="${actionBadgeStyle(l.action)};padding:0.2rem 0.6rem;border-radius:9999px;font-size:0.7rem;font-weight:700">${l.action}</span></td>
                <td><span style="background:${moduleColor(l.module)}20;color:${moduleColor(l.module)};padding:0.2rem 0.6rem;border-radius:9999px;font-size:0.7rem;font-weight:700;text-transform:capitalize">${l.module}</span></td>
                <td style="color:var(--text-secondary);font-size:0.8rem;max-width:300px;white-space:normal;line-height:1.4">${l.description}</td>
                <td style="color:var(--text-secondary);font-size:0.75rem;white-space:nowrap">${l.created_at}</td>
            </tr>`).join('');
    }

    async function loadAuditLog() {
        const res = await apiGet('/audit/read.php');
        if (res.status !== 'success') { toastError('Failed to load audit log.'); return; }
        allLogs = res.data;
        renderSummaryCards(allLogs);
        renderRows(allLogs);
        if (auditTable) auditTable.destroy();
        auditTable = $('#auditTable').DataTable({ pageLength: 20, order: [[0, 'desc']], columnDefs: [{ targets: 6, orderable: false }] });
    }

    function filterTable() {
        const moduleVal = document.getElementById('moduleFilter').value.toLowerCase();
        const actionVal = document.getElementById('actionFilter').value.toUpperCase();
        let filtered = allLogs;
        if (moduleVal) filtered = filtered.filter(l => l.module === moduleVal);
        if (actionVal) filtered = filtered.filter(l => l.action === actionVal);
        renderSummaryCards(filtered);
        if (auditTable) auditTable.destroy();
        renderRows(filtered);
        auditTable = $('#auditTable').DataTable({ pageLength: 20, order: [[0, 'desc']], columnDefs: [{ targets: 6, orderable: false }] });
    }
</script>
</body>
</html>
